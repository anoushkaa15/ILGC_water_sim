<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HydroLab Water Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#c8e6f4;--surface:#f8fbfe;--card:#ffffffde;--text:#121826;--muted:#5f6878;--line:#d3dde8;--primary:#1f6fe5;--ok:#1ca55c;--warn:#ffbe4d;--danger:#eb5e5e;--shadow:0 14px 28px rgba(0, 34, 68, 0.08);--radius:22px; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#d6edf9 0%,var(--bg) 100%);min-height:100vh}
    .topbar{background:#ffffffd7;border-bottom:1px solid #dbe5ef;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;gap:18px;position:sticky;top:0;z-index:10;backdrop-filter:blur(6px)}
    .brand{display:flex;gap:14px;align-items:center}.logo{width:52px;height:52px;border-radius:16px;background:radial-gradient(circle at 30% 25%,#b7f4ff,#54c9ee 60%,#2aa4dc);position:relative}.logo::after{content:"";position:absolute;width:24px;height:30px;left:14px;top:10px;border-radius:50% 50% 60% 60%;background:linear-gradient(180deg,#f5fbff,#4f95f1);transform:rotate(12deg);opacity:.9}
    .brand h1{margin:0;font-size:34px}.brand p{margin:2px 0 0;color:var(--muted);font-size:15px}.container{max-width:1420px;margin:28px auto;padding:0 18px 22px}.screen{display:none}.screen.active{display:block}.big-card,.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
    .btn,.btn-primary,select,input{border-radius:14px;padding:10px 14px}.btn-primary{border:none;background:linear-gradient(180deg,#2d7cf0,var(--primary));color:#fff;font-weight:800;cursor:pointer}.btn{border:1px solid var(--line);background:#fff;font-weight:800;cursor:pointer}
    .level-grid,.content-grid{display:grid;gap:14px}.level-grid{grid-template-columns:repeat(3,minmax(220px,1fr));margin:18px 0 22px}.content-grid{grid-template-columns:1fr 1fr 1fr}
    .hud{display:grid;grid-template-columns:1.35fr auto auto auto;gap:14px;align-items:center;margin-bottom:18px}.stats h2,.panel h3{margin:0 0 8px}.stats h2{font-size:34px}.subtext,.meta{color:var(--muted);font-size:15px}
    .chip,.status-banner,.path,.coin-box,.quiz-card,.lang{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px}
    .material{border:1px dashed #b6c4d7;border-radius:12px;padding:12px;background:#eaf1fa;cursor:grab;display:flex;flex-direction:column;gap:6px;margin-bottom:8px}.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:12px}.slot{min-height:78px;border:1px dashed #b8c4d4;border-radius:10px;display:grid;place-items:center}.slot.filled{font-weight:800;background:#dfe8f3;border-style:solid}
    .hidden{display:none!important}.video-wrap iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:12px}.goals{margin:10px 0}.goals h4{margin:8px 0 6px}.leaderboard-table{width:100%;border-collapse:collapse}.leaderboard-table th,.leaderboard-table td{padding:8px;border-bottom:1px solid #dbe5ef;text-align:left}
    @media (max-width:1200px){.hud,.content-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="logo"></div><div><h1>HydroLab</h1><p id="tagline">Clean Water Quest</p></div></div>
    <div class="lang"><label for="langSelect" id="langLabel">Language:</label> <select id="langSelect"><option value="en">English</option><option value="hi">हिंदी</option></select></div>
  </header>

  <main class="container">
    <section id="landingScreen" class="screen active"><article class="big-card">
      <h2 id="welcomeHeading">Welcome to HydroLab</h2>
      <p id="platformOverview" class="subtext"></p>
      <h3 id="overallOutcomesHeading"></h3><ul id="overallOutcomes"></ul>
      <label id="nameLabel" for="nameInput"></label>
      <input id="nameInput" placeholder="Enter your name" />
      <button class="btn-primary" id="enterBtn">Enter Dashboard</button>
      <div id="nameErr" class="subtext" style="color:#b91c1c"></div>
    </article></section>

    <section id="homeScreen" class="screen"><article class="big-card"><h2 id="chooseLevel"></h2><p class="subtext" id="homeSubtitle"></p><div class="level-grid" id="homeLevelGrid"></div><button class="btn-primary" onclick="startLevel(1)" id="startLvl1"></button><button class="btn" onclick="openLeaderboard()" id="leaderboardBtn"></button></article></section>

    <section id="leaderboardScreen" class="screen"><article class="big-card"><h2 id="leaderboardTitle"></h2><p id="leaderboardSub" class="subtext"></p><table class="leaderboard-table"><thead><tr><th>#</th><th id="lbName"></th><th id="lbScore"></th><th id="lbTasks"></th></tr></thead><tbody id="leaderboardBody"></tbody></table><button class="btn" onclick="showScreen('homeScreen')" id="backHome"></button></article></section>

    <section id="gameScreen" class="screen">
      <div class="hud panel"><div class="stats"><h2 id="levelTitle"></h2><div class="meta" id="levelMeta"></div></div><div class="path"><div id="pathDots"></div></div><div class="coin-box">🪙 <span id="coinVal">0</span></div><div><button class="btn" onclick="exitToHome()" id="exitBtn"></button> <button class="btn" onclick="showHint()" id="hintBtn"></button> <button class="btn-primary" onclick="nextLevel()" id="nextBtn"></button></div></div>
      <div class="content-grid">
        <article class="panel"><h3 id="leftHeading"></h3><p id="leftSub" class="subtext"></p><div class="video-wrap"><iframe id="conceptVideo" allowfullscreen></iframe></div><div class="goals"><h4 id="goalsHeading"></h4><ul id="goalsList"></ul><h4 id="outcomesHeading"></h4><ul id="outcomesList"></ul></div><div id="leftStatus" class="status-banner hidden"></div></article>
        <article class="panel"><h3 id="centerHeading"></h3><p id="centerSub" class="subtext"></p><div id="materialList"></div><div id="level3Controls" class="hidden"><div><label id="phLbl"></label><input id="phSlider" type="range" min="0" max="14" step="0.1" value="7"></div><div><label id="turbLbl"></label><input id="turbSlider" type="range" min="0" max="100" value="45"></div><div><label id="tempLbl"></label><input id="tempSlider" type="range" min="0" max="45" value="25"></div><button class="btn-primary" onclick="submitLevel3()" id="submitL3"></button><div id="l3Result" class="status-banner hidden"></div></div></article>
        <article class="panel"><h3 id="rightHeading"></h3><p id="rightSub" class="subtext"></p><div id="slots" class="slots"></div><div id="placedCount" class="subtext"></div><div id="feedback" class="status-banner hidden"></div><div id="quizArea" class="quiz-card hidden"></div></article>
      </div>
    </section>
  </main>
  <aside id="hintBox" class="hidden"></aside>

<script>
const i18n={en:{tagline:"Clean Water Quest",langLabel:"Language:",welcomeHeading:"Welcome to HydroLab",platformOverview:"HydroLab is a gamified learning platform for water quality concepts across pH, turbidity, and temperature.",overallOutcomesHeading:"Overall Learning Outcomes",overallOutcomes:["Interpret core water quality indicators.","Apply treatment steps in correct sequence.","Evaluate safe vs unsafe water parameter ranges."],nameLabel:"Name (required):",enterBtn:"Enter Dashboard",chooseLevel:"Choose a level",homeSubtitle:"Progressive tasks with interactive checks.",startLvl1:"Start from Level 1",leaderboardBtn:"View Leaderboard",leaderboardTitle:"Leaderboard",leaderboardSub:"Top learners by score",lbName:"Name",lbScore:"Score",lbTasks:"Tasks",backHome:"Back Home",exitBtn:"Exit",hintBtn:"Hint",nextBtn:"Next",goalsHeading:"Learning Goals",outcomesHeading:"Expected Outcomes",submitL3:"Submit Level 3",safe:"Safe",unsafe:"Unsafe",outOfRange:"Out of range",dropHere:"drop here",placed:"Placed",completed:"Completed!",tryAgain:"Not correct. Try again.",trueLabel:"True",falseLabel:"False",nameRequired:"Name is required.",tryAgainQuiz:"Try again"},hi:{tagline:"स्वच्छ जल अभियान",langLabel:"भाषा:",welcomeHeading:"हाइड्रोलैब में आपका स्वागत है",platformOverview:"HydroLab पानी की गुणवत्ता पर गेम-आधारित सीखने का मंच है।",overallOutcomesHeading:"समग्र सीखने के परिणाम",overallOutcomes:["पानी की गुणवत्ता संकेतकों को समझना।","शुद्धिकरण क्रम लागू करना।","सुरक्षित और असुरक्षित सीमाएँ पहचानना।"],nameLabel:"नाम (आवश्यक):",enterBtn:"डैशबोर्ड में जाएँ",chooseLevel:"लेवल चुनें",homeSubtitle:"इंटरैक्टिव कार्य और मूल्यांकन।",startLvl1:"लेवल 1 से शुरू करें",leaderboardBtn:"लीडरबोर्ड देखें",leaderboardTitle:"लीडरबोर्ड",leaderboardSub:"स्कोर के अनुसार शीर्ष शिक्षार्थी",lbName:"नाम",lbScore:"स्कोर",lbTasks:"कार्य",backHome:"होम",exitBtn:"बाहर निकलें",hintBtn:"संकेत",nextBtn:"अगला",goalsHeading:"सीखने के लक्ष्य",outcomesHeading:"अपेक्षित परिणाम",submitL3:"लेवल 3 जमा करें",safe:"सुरक्षित",unsafe:"असुरक्षित",outOfRange:"सीमा से बाहर",dropHere:"यहाँ रखें",placed:"रखा गया",completed:"पूर्ण हुआ!",tryAgain:"सही नहीं है। फिर प्रयास करें।",trueLabel:"सही",falseLabel:"गलत",nameRequired:"नाम आवश्यक है।",tryAgainQuiz:"फिर प्रयास करें"}};
const taskDetails={1:{goals:{en:["Understand acidic, neutral, and basic samples.","Arrange pH values in ascending order."],hi:["अम्लीय, उदासीन और क्षारीय नमूनों को समझना।","pH मानों को छोटे से बड़े क्रम में लगाना।"]},outcomes:{en:["Identify neutral water at pH 7.","Classify common samples by pH."],hi:["pH 7 पर उदासीन जल पहचानना।","सामान्य नमूनों को pH के अनुसार वर्गीकृत करना।"]},video:"https://www.youtube.com/embed?listType=search&list=pH+scale+Hindi"},2:{goals:{en:["Understand turbidity reduction workflow.","Sequence treatment actions logically."],hi:["टर्बिडिटी घटाने की प्रक्रिया समझना।","उपचार चरणों का सही क्रम बनाना।"]},outcomes:{en:["Explain NTU reduction steps.","Choose suitable order for clarifying water."],hi:["NTU घटाने के चरण समझाना।","पानी साफ करने का उपयुक्त क्रम चुनना।"]},video:"https://www.youtube.com/embed?listType=search&list=turbidity+in+water+Hindi"},3:{goals:{en:["Connect temperature with molecular movement.","Validate water quality targets."],hi:["तापमान और अणुओं की गति का संबंध समझना।","जल गुणवत्ता लक्ष्यों का सत्यापन करना।"]},outcomes:{en:["Judge safe/unsafe values for pH, turbidity, temperature.","Relate heat with kinetic behavior."],hi:["pH, टर्बिडिटी और तापमान के सुरक्षित/असुरक्षित मान पहचानना।","ऊष्मा और काइनेटिक व्यवहार का संबंध बताना।"]},video:"https://www.youtube.com/embed?listType=search&list=water+temperature+molecules+Hindi"}};
const questionBank={1:[{q:"True or False: pH 7 is neutral.",a:true,s:"Correct!"},{q:"True or False: pH 2 is basic.",a:false,s:"Right, pH 2 is acidic."}],2:[{q:"True or False: High turbidity means clear water.",a:false,s:"Correct!"},{q:"True or False: Filtration can reduce fine particles.",a:true,s:"Correct!"}],3:[{q:"True or False: Higher temperature increases molecular motion.",a:true,s:"Correct!"},{q:"True or False: pH 9 is inside drinking-safe range 6.5-8.5.",a:false,s:"Correct!"}]};
const levels={1:{title:{en:"Level 1: pH Detective",hi:"स्तर 1: pH जासूस"},meta:{en:"pH scale",hi:"pH स्केल"},leftHeading:{en:"pH Challenge",hi:"pH चुनौती"},leftSub:{en:"Arrange cards",hi:"कार्ड क्रमबद्ध करें"},centerHeading:{en:"Sample Cards",hi:"नमूना कार्ड"},centerSub:{en:"Drag in order",hi:"क्रम में रखें"},rightHeading:{en:"Slots",hi:"स्लॉट"},rightSub:{en:"Low to high",hi:"कम से अधिक"},items:[{name:"Lemon Juice (pH 2)",removes:"acidic"},{name:"Pure Water (pH 7)",removes:"neutral"},{name:"Soap Solution (pH 10)",removes:"basic"}],correctOrder:["Lemon Juice (pH 2)","Pure Water (pH 7)","Soap Solution (pH 10)"],slots:3,hints:{en:"Acid to base.",hi:"अम्ल से क्षार की ओर।"}},2:{title:{en:"Level 2: Turbidity",hi:"स्तर 2: टर्बिडिटी"},meta:{en:"NTU",hi:"एनटीयू"},leftHeading:{en:"Turbidity Plan",hi:"टर्बिडिटी योजना"},leftSub:{en:"Build order",hi:"क्रम बनाएं"},centerHeading:{en:"Actions",hi:"क्रियाएँ"},centerSub:{en:"Drag steps",hi:"चरण रखें"},rightHeading:{en:"Process",hi:"प्रक्रिया"},rightSub:{en:"Dirty to clear",hi:"गंदे से साफ"},items:[{name:"Add Coagulant",removes:"bind particles"},{name:"Allow Settling",removes:"drop flocs"},{name:"Filter Media",removes:"final filter"}],correctOrder:["Add Coagulant","Allow Settling","Filter Media"],slots:3,hints:{en:"Coagulate-settle-filter.",hi:"पहले जमाव, फिर बैठना, फिर फ़िल्टर।"}},3:{title:{en:"Level 3: Temp & Motion",hi:"स्तर 3: तापमान और गति"},meta:{en:"safety",hi:"सुरक्षा"},leftHeading:{en:"Dynamic Model",hi:"गतिशील मॉडल"},leftSub:{en:"Set values + concept",hi:"मान सेट करें + अवधारणा"},centerHeading:{en:"Controls",hi:"नियंत्रण"},centerSub:{en:"Use sliders",hi:"स्लाइडर प्रयोग करें"},rightHeading:{en:"Console",hi:"मिशन कंसोल"},rightSub:{en:"Finish mission",hi:"मिशन पूरा करें"},items:[{name:"Higher temp → faster molecules",removes:"correct"},{name:"Higher temp → slower molecules",removes:"incorrect"}],correctOrder:["Higher temp → faster molecules"],slots:1,hints:{en:"Heat increases motion.",hi:"ऊष्मा से गति बढ़ती है।"}}};
const state={userName:localStorage.getItem('hydro_user')||'',language:localStorage.getItem('hydro_lang')||'en',currentLevel:1,coins:0,stepsPlaced:[],draggedItem:null,completed:new Set(),ph:7,turb:45,temp:25,controlsPassed:false,quizDone:false,levelPassed:false,usedQuestions:{1:[],2:[],3:[]}};
function t(k){return i18n[state.language][k]||k;} function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function applyI18n(){Object.keys(i18n.en).forEach(k=>{const el=document.getElementById(k); if(el && typeof i18n[state.language][k]==='string') el.innerText=t(k);}); document.documentElement.lang=state.language==='hi'?'hi':'en'; const ol=document.getElementById('overallOutcomes');ol.innerHTML=i18n[state.language].overallOutcomes.map(x=>`<li>${x}</li>`).join('');localStorage.setItem('hydro_lang',state.language);renderHomeLevels(); if(document.getElementById('gameScreen').classList.contains('active')){applyLevelText(state.currentLevel);renderLevelUI();}}
function renderHomeLevels(){homeLevelGrid.innerHTML=Object.entries(levels).map(([id,l])=>`<button class='btn' onclick='startLevel(${id})'><strong>${state.language==='hi'?'स्तर':'Level'} ${id}</strong><div>${l.title[state.language]}</div></button>`).join('');}
function startLevel(id){state.currentLevel=id;state.stepsPlaced=[];state.controlsPassed=false;state.quizDone=false;state.levelPassed=false;showScreen('gameScreen');applyLevelText(id);renderLevelUI();}
function applyLevelText(id){const l=levels[id];['title','meta','leftHeading','leftSub','centerHeading','centerSub','rightHeading','rightSub'].forEach(k=>document.getElementById(k==='title'?'levelTitle':k==='meta'?'levelMeta':k).innerText=l[k][state.language]);document.getElementById('goalsList').innerHTML=taskDetails[id].goals[state.language].map(x=>`<li>${x}</li>`).join('');document.getElementById('outcomesList').innerHTML=taskDetails[id].outcomes[state.language].map(x=>`<li>${x}</li>`).join('');document.getElementById('conceptVideo').src=taskDetails[id].video;}
function renderLevelUI(){const l=levels[state.currentLevel];materialList.innerHTML='';slots.innerHTML='';document.getElementById('level3Controls').classList.toggle('hidden',state.currentLevel!==3);[...l.items].sort(()=>Math.random()-0.5).forEach(it=>{const d=document.createElement('div');d.className='material';d.draggable=true;d.dataset.name=it.name;d.innerHTML=`<strong>${it.name}</strong><small>${it.removes}</small>`;d.addEventListener('dragstart',()=>state.draggedItem=it.name);materialList.appendChild(d);});for(let i=0;i<l.slots;i++){const el=document.createElement('div');el.className='slot';el.innerText=t('dropHere');el.addEventListener('dragover',e=>e.preventDefault());el.addEventListener('drop',e=>{e.preventDefault();handleDrop(i)});slots.appendChild(el);}updatePlacedCount();}
function handleDrop(i){if(!state.draggedItem||state.stepsPlaced[i])return;state.stepsPlaced[i]=state.draggedItem;const el=slots.children[i];el.classList.add('filled');el.innerText=state.draggedItem;updatePlacedCount();checkCompletion();}
function updatePlacedCount(){document.getElementById('placedCount').innerText=`${t('placed')}: ${state.stepsPlaced.filter(Boolean).length}/${levels[state.currentLevel].slots}`;}
function submitLevel3(){const status=validateWaterParameters(state.ph,state.turb,state.temp);const out=document.getElementById('l3Result');out.classList.remove('hidden');out.innerText=`pH: ${status.ph}, Turbidity: ${status.turbidity}, Temperature: ${status.temperature}`;state.controlsPassed=status.allSafe;checkCompletion();}
function validateWaterParameters(ph,turb,temp){const phs=ph<0||ph>14?t('outOfRange'):(ph>=6.5&&ph<=8.5?t('safe'):t('unsafe'));const ts=turb<0?t('outOfRange'):(turb<5?t('safe'):t('unsafe'));const temps=temp<0||temp>45?t('outOfRange'):(temp>=10&&temp<=30?t('safe'):t('unsafe'));return{ph:phs,turbidity:ts,temperature:temps,allSafe:phs===t('safe')&&ts===t('safe')&&temps===t('safe')}}
function checkCompletion(){const l=levels[state.currentLevel],placed=state.stepsPlaced.filter(Boolean);if(placed.length<l.slots)return;let ok=JSON.stringify(placed)===JSON.stringify(l.correctOrder);if(state.currentLevel===3)ok=ok&&state.controlsPassed;if(ok){state.levelPassed=true;state.completed.add(state.currentLevel);updateCoins(20);renderQuiz();updateLeaderboard();feedback.classList.remove('hidden');feedback.innerText=t('completed'); if(state.completed.size===3){openLeaderboard();return;}}else{feedback.classList.remove('hidden');feedback.innerText=t('tryAgain');}}
function getNextQuestion(level){const used=state.usedQuestions[level];const pool=questionBank[level].filter((_,idx)=>!used.includes(idx));if(pool.length===0)state.usedQuestions[level]=[];const idx=Math.floor(Math.random()*questionBank[level].length);state.usedQuestions[level].push(idx);return questionBank[level][idx];}
let currentQuestion=null;function renderQuiz(){currentQuestion=getNextQuestion(state.currentLevel);const qa=document.getElementById('quizArea');qa.classList.remove('hidden');qa.innerHTML=`<p>${currentQuestion.q}</p><button class='btn' onclick='answerQuiz(true)'>${t('trueLabel')}</button> <button class='btn' onclick='answerQuiz(false)'>${t('falseLabel')}</button><div id='quizResult'></div>`;}
function answerQuiz(c){if(!state.levelPassed)return;const r=document.getElementById('quizResult');if(c===currentQuestion.a){r.innerText=currentQuestion.s; if(!state.quizDone){updateCoins(10);state.quizDone=true;updateLeaderboard();}} else r.innerText=t('tryAgainQuiz');}
function updateCoins(d=0){state.coins=Math.max(0,state.coins+d);coinVal.innerText=state.coins;}
function updateLeaderboard(){if(!state.userName)return;const key='hydro_leaderboard';const data=JSON.parse(localStorage.getItem(key)||'[]');const tasks=state.completed.size;const existing=data.find(x=>x.name===state.userName);if(existing){existing.score=Math.max(existing.score,state.coins);existing.tasks=Math.max(existing.tasks,tasks);}else{data.push({name:state.userName,score:state.coins,tasks});}data.sort((a,b)=>b.score-a.score);localStorage.setItem(key,JSON.stringify(data));renderLeaderboard();}
function renderLeaderboard(){const rows=JSON.parse(localStorage.getItem('hydro_leaderboard')||'[]');leaderboardBody.innerHTML=rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.name}</td><td>${r.score}</td><td>${r.tasks}</td></tr>`).join('');}
function openLeaderboard(){updateLeaderboard();showScreen('leaderboardScreen');}
function exitToHome(){showScreen('homeScreen');}
function nextLevel(){startLevel(state.currentLevel===3?1:state.currentLevel+1)}
function showHint(){hintBox.classList.remove('hidden');hintBox.innerText=levels[state.currentLevel].hints[state.language];}
phSlider.addEventListener('input',e=>{state.ph=parseFloat(e.target.value);phLbl.innerText=`pH: ${state.ph.toFixed(1)}`});turbSlider.addEventListener('input',e=>{state.turb=parseInt(e.target.value);turbLbl.innerText=`Turbidity: ${state.turb} NTU`});tempSlider.addEventListener('input',e=>{state.temp=parseInt(e.target.value);tempLbl.innerText=`Temperature: ${state.temp}°C`});
langSelect.value=state.language;langSelect.addEventListener('change',e=>{state.language=e.target.value;applyI18n()});
enterBtn.addEventListener('click',()=>{const n=nameInput.value.trim();if(!n){nameErr.innerText=t('nameRequired');return;}state.userName=n;localStorage.setItem('hydro_user',n);nameErr.innerText='';showScreen('homeScreen');updateLeaderboard();});
if(state.userName){nameInput.value=state.userName;showScreen('homeScreen');}
applyI18n();renderHomeLevels();renderLeaderboard();
</script>
</body></html>
